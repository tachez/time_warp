<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Time Warp Scan - Эффект сканирования времени</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #000;
            font-family: system-ui, 'Segoe UI', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        
        .scan-container {
            position: relative;
            background: #000;
            margin: 0 auto;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }
        
        .controls-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .controls-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .control-group {
            flex: 1;
            min-width: 180px;
            background: rgba(255,255,255,0.1);
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .control-group label {
            display: block;
            color: #fff;
            font-size: 0.8rem;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .control-group input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 1rem;
            font-family: monospace;
            font-weight: bold;
        }
        
        .control-group input:focus {
            outline: none;
            border-color: #ff4757;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: #ff4757;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            min-width: 140px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        button:active {
            transform: scale(0.97);
        }
        
        button.reset-btn {
            background: #2f3542;
        }
        
        button.save-btn {
            background: #2ecc71;
        }
        
        button.camera-btn {
            background: #3498db;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 40px;
            z-index: 100;
            font-weight: 500;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 90%;
        }
        
        .info {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .value-display {
            font-size: 0.7rem;
            color: #ff4757;
            margin-top: 4px;
            text-align: right;
            font-family: monospace;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.2); }
        }
        
        .scan-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,51,102,0.4) 0%, rgba(255,51,102,0) 70%);
            pointer-events: none;
            z-index: 50;
            animation: pulse 1s ease-in-out infinite;
            display: none;
        }
        
        .notification {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(46, 204, 113, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 200;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        @media (min-width: 768px) {
            .controls-panel {
                bottom: 50px;
                left: 50px;
                right: 50px;
            }
            
            .scan-container {
                margin: 50px;
                border-radius: 24px;
                height: calc(100vh - 100px);
            }
            
            .status {
                top: 70px;
                white-space: nowrap;
            }
        }
        
        @media (max-width: 767px) {
            .controls-panel {
                bottom: 15px;
                left: 15px;
                right: 15px;
                padding: 15px;
            }
            
            .scan-container {
                margin: 0;
                height: 100vh;
            }
            
            .status {
                top: 15px;
                font-size: 0.75rem;
                white-space: normal;
                text-align: center;
                max-width: 90%;
            }
            
            button {
                padding: 10px 20px;
                font-size: 0.95rem;
                min-width: 110px;
            }
            
            .control-group {
                min-width: 140px;
            }
            
            .control-group label {
                font-size: 0.7rem;
            }
            
            .control-group input {
                font-size: 0.9rem;
                padding: 6px 10px;
            }
            
            .notification {
                font-size: 0.8rem;
                white-space: normal;
                max-width: 80%;
                text-align: center;
                top: 80px;
            }
            
            .info {
                font-size: 0.6rem;
            }
        }
        
        @media (max-width: 480px) {
            .control-group {
                min-width: 120px;
            }
            
            button {
                padding: 8px 16px;
                font-size: 0.85rem;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="scan-container" id="scanContainer">
        <canvas id="viewfinderCanvas"></canvas>
    </div>
    
    <div class="status" id="statusMsg">📱 Нажмите "ВКЛЮЧИТЬ КАМЕРУ"</div>
    <div id="scanIndicator" class="scan-indicator"></div>
    <div id="notification" class="notification">✅ Изображение сохранено!</div>
    
    <div class="controls-panel">
        <div class="controls-row">
            <div class="control-group">
                <label>⚡ СКОРОСТЬ СКАНИРОВАНИЯ (пикс/кадр)</label>
                <input type="number" id="scanSpeedInput" step="0.01" min="0.1" max="20" value="1.25">
                <div class="value-display" id="speedValue">1.25 пикс/кадр</div>
            </div>
            
            <div class="control-group">
                <label>📏 ВЫСОТА СТРОКИ (пиксели)</label>
                <input type="number" id="rowHeightInput" step="0.01" min="0.5" max="50" value="5">
                <div class="value-display" id="rowHeightValue">5.00 пикс</div>
            </div>
        </div>
        
        <div class="button-group">
            <button id="enableCameraBtn" class="camera-btn">📱 ВКЛЮЧИТЬ КАМЕРУ</button>
            <button id="captureBtn" class="capture-btn" disabled>🌀 TIME WARP</button>
            <button id="saveBtn" class="save-btn" disabled>💾 СОХРАНИТЬ</button>
            <button id="resetBtn" class="reset-btn" disabled>⟳ СБРОС</button>
        </div>
        
        <div class="info">
            🎯 Область ВЫШЕ линии - замороженное изображение | Область НИЖЕ линии - живое видео<br>
            📱 На iOS: нажмите "ВКЛЮЧИТЬ КАМЕРУ" для доступа | 💾 После сканирования нажмите СОХРАНИТЬ
        </div>
    </div>

    <script>
        (function() {
            // Элементы
            const canvas = document.getElementById('viewfinderCanvas');
            const ctx = canvas.getContext('2d');
            const scanContainer = document.getElementById('scanContainer');
            const captureBtn = document.getElementById('captureBtn');
            const saveBtn = document.getElementById('saveBtn');
            const resetBtn = document.getElementById('resetBtn');
            const enableCameraBtn = document.getElementById('enableCameraBtn');
            const statusDiv = document.getElementById('statusMsg');
            const scanIndicator = document.getElementById('scanIndicator');
            const notification = document.getElementById('notification');
            
            // Поля ввода
            const scanSpeedInput = document.getElementById('scanSpeedInput');
            const rowHeightInput = document.getElementById('rowHeightInput');
            const speedValue = document.getElementById('speedValue');
            const rowHeightValue = document.getElementById('rowHeightValue');
            
            // Видео элементы
            let videoElement = null;
            let videoStream = null;
            
            // Состояние
            let isScanning = false;
            let isScanComplete = false;
            let animationId = null;
            let renderAnimationId = null;
            let isCameraReady = false;
            let lastCapturedImage = null;
            
            // Параметры
            let scanSpeed = 1.25;
            let rowHeight = 5;
            let currentLine = 0;
            let canvasWidth = 0;
            let canvasHeight = 0;
            
            // Буфер для замороженных строк
            let frozenBuffer = null;
            
            // Определение мобильного устройства
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            
            // Показать уведомление
            function showNotification(message, isError = false) {
                notification.textContent = isError ? `❌ ${message}` : `✅ ${message}`;
                notification.style.background = isError ? 'rgba(231, 76, 60, 0.95)' : 'rgba(46, 204, 113, 0.95)';
                notification.classList.add('show');
                setTimeout(() => notification.classList.remove('show'), 2000);
            }
            
            // Обновление отображения значений
            function updateDisplayValues() {
                speedValue.textContent = `${scanSpeed.toFixed(2)} пикс/кадр`;
                rowHeightValue.textContent = `${rowHeight.toFixed(2)} пикс`;
            }
            
            // Обновление параметров
            function updateParameters() {
                scanSpeed = parseFloat(scanSpeedInput.value);
                rowHeight = parseFloat(rowHeightInput.value);
                if (isNaN(scanSpeed)) scanSpeed = 1.25;
                if (isNaN(rowHeight)) rowHeight = 5;
                scanSpeed = Math.max(0.1, Math.min(20, scanSpeed));
                rowHeight = Math.max(0.5, Math.min(50, rowHeight));
                scanSpeedInput.value = scanSpeed;
                rowHeightInput.value = rowHeight;
                updateDisplayValues();
            }
            
            scanSpeedInput.addEventListener('input', () => {
                scanSpeed = parseFloat(scanSpeedInput.value);
                if (isNaN(scanSpeed)) scanSpeed = 1.25;
                scanSpeed = Math.max(0.1, Math.min(20, scanSpeed));
                scanSpeedInput.value = scanSpeed;
                updateDisplayValues();
            });
            
            rowHeightInput.addEventListener('input', () => {
                rowHeight = parseFloat(rowHeightInput.value);
                if (isNaN(rowHeight)) rowHeight = 5;
                rowHeight = Math.max(0.5, Math.min(50, rowHeight));
                rowHeightInput.value = rowHeight;
                updateDisplayValues();
            });
            
            // Обновление размеров canvas
            function updateCanvasSize() {
                const rect = scanContainer.getBoundingClientRect();
                canvasWidth = rect.width;
                canvasHeight = rect.height;
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                
                if (!isScanning && !isScanComplete && videoElement && videoElement.readyState >= 2) {
                    ctx.drawImage(videoElement, 0, 0, canvasWidth, canvasHeight);
                }
            }
            
            // Инициализация камеры
            async function initCamera() {
                try {
                    updateStatus("📷 Запрос доступа к камере...");
                    
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error("Ваш браузер не поддерживает доступ к камере");
                    }
                    
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: {
                            width: { ideal: 1920 },
                            height: { ideal: 1080 },
                            facingMode: "user"
                        } 
                    });
                    
                    videoStream = stream;
                    videoElement = document.createElement('video');
                    videoElement.srcObject = stream;
                    videoElement.setAttribute('playsinline', true);
                    videoElement.setAttribute('autoplay', true);
                    videoElement.muted = true;
                    
                    await new Promise((resolve, reject) => {
                        videoElement.onloadedmetadata = () => {
                            console.log(`Video ready: ${videoElement.videoWidth}x${videoElement.videoHeight}`);
                            resolve();
                        };
                        videoElement.onerror = reject;
                        videoElement.load();
                    });
                    
                    await videoElement.play();
                    
                    updateStatus("✅ Камера готова! Нажмите TIME WARP");
                    isCameraReady = true;
                    captureBtn.disabled = false;
                    resetBtn.disabled = false;
                    saveBtn.disabled = true;
                    
                    if (enableCameraBtn) enableCameraBtn.style.display = "none";
                    
                    startRenderLoop();
                    updateCanvasSize();
                    
                } catch (err) {
                    console.error("Camera error:", err);
                    let errorMsg = "❌ Ошибка доступа к камере. ";
                    if (err.name === 'NotAllowedError') {
                        errorMsg += "Разрешите доступ к камере в браузере.";
                    } else if (err.name === 'NotFoundError') {
                        errorMsg += "Камера не найдена.";
                    } else {
                        errorMsg += err.message;
                    }
                    updateStatus(errorMsg, true);
                    captureBtn.disabled = true;
                    resetBtn.disabled = true;
                    saveBtn.disabled = true;
                    isCameraReady = false;
                }
            }
            
            // Рендеринг видео
            function startRenderLoop() {
                if (renderAnimationId) cancelAnimationFrame(renderAnimationId);
                
                function render() {
                    if (!isScanning && !isScanComplete && videoElement && videoElement.readyState >= 2 && canvasWidth > 0) {
                        try {
                            ctx.drawImage(videoElement, 0, 0, canvasWidth, canvasHeight);
                        } catch (err) {
                            console.error("Render error:", err);
                        }
                    }
                    renderAnimationId = requestAnimationFrame(render);
                }
                render();
            }
            
            // Сохранение изображения
            function saveImage() {
                if (!lastCapturedImage) {
                    showNotification("Нет сохранённого изображения", true);
                    return;
                }
                try {
                    const link = document.createElement('a');
                    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                    link.download = `timewarp_${timestamp}.png`;
                    link.href = lastCapturedImage;
                    link.click();
                    showNotification("Изображение сохранено!");
                } catch (err) {
                    console.error("Save error:", err);
                    showNotification("Ошибка сохранения", true);
                }
            }
            
            // Сброс
            function resetScan() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                isScanning = false;
                isScanComplete = false;
                currentLine = 0;
                lastCapturedImage = null;
                frozenBuffer = null;
                scanIndicator.style.display = "none";
                saveBtn.disabled = true;
                updateStatus("✅ Режим сброшен");
                
                if (videoElement && videoElement.readyState >= 2 && canvasWidth > 0) {
                    ctx.drawImage(videoElement, 0, 0, canvasWidth, canvasHeight);
                }
            }
            
            // Time Warp Scan эффект
            function startTimeWarpScan() {
                if (isScanning) {
                    updateStatus("⚠️ Сканирование уже идет");
                    return;
                }
                
                if (!isCameraReady || !videoElement || videoElement.readyState < 2) {
                    updateStatus("⚠️ Камера не готова");
                    return;
                }
                
                if (canvasWidth === 0 || canvasHeight === 0) {
                    updateCanvasSize();
                }
                
                updateParameters();
                updateStatus(`🌀 СКАНИРОВАНИЕ... (${scanSpeed.toFixed(2)} пикс/кадр, ${rowHeight.toFixed(2)} пикс)`);
                scanIndicator.style.display = "block";
                
                const width = canvasWidth;
                const height = canvasHeight;
                
                // Инициализируем буфер замороженных строк
                frozenBuffer = ctx.createImageData(width, height);
                for (let i = 0; i < frozenBuffer.data.length; i += 4) {
                    frozenBuffer.data[i] = 0;
                    frozenBuffer.data[i+1] = 0;
                    frozenBuffer.data[i+2] = 0;
                    frozenBuffer.data[i+3] = 255;
                }
                
                currentLine = 0;
                isScanning = true;
                isScanComplete = false;
                saveBtn.disabled = true;
                
                function scanFrame() {
                    if (!isScanning) return;
                    
                    try {
                        // Получаем текущий кадр с камеры
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = width;
                        tempCanvas.height = height;
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(videoElement, 0, 0, width, height);
                        const currentFrame = tempCtx.getImageData(0, 0, width, height);
                        
                        // Определяем новую позицию линии
                        const nextLine = Math.min(currentLine + scanSpeed, height);
                        
                        // Замораживаем строки от currentLine до nextLine
                        for (let row = currentLine; row < nextLine; row++) {
                            const rowStartFrozen = row * width * 4;
                            const rowStartFrame = row * width * 4;
                            
                            for (let col = 0; col < width; col++) {
                                const frozenPos = rowStartFrozen + col * 4;
                                const framePos = rowStartFrame + col * 4;
                                frozenBuffer.data[frozenPos] = currentFrame.data[framePos];
                                frozenBuffer.data[frozenPos+1] = currentFrame.data[framePos+1];
                                frozenBuffer.data[frozenPos+2] = currentFrame.data[framePos+2];
                                frozenBuffer.data[frozenPos+3] = 255;
                            }
                        }
                        
                        currentLine = nextLine;
                        
                        // Отрисовываем результат
                        if (currentLine < height) {
                            // Рисуем замороженную часть (от 0 до currentLine)
                            const frozenPart = ctx.createImageData(width, currentLine);
                            for (let row = 0; row < currentLine; row++) {
                                const srcStart = row * width * 4;
                                const dstStart = row * width * 4;
                                for (let i = 0; i < width * 4; i++) {
                                    frozenPart.data[dstStart + i] = frozenBuffer.data[srcStart + i];
                                }
                            }
                            ctx.putImageData(frozenPart, 0, 0);
                            
                            // Рисуем живую часть (от currentLine до height)
                            const livePart = ctx.createImageData(width, height - currentLine);
                            for (let row = currentLine; row < height; row++) {
                                const srcStart = row * width * 4;
                                const dstStart = (row - currentLine) * width * 4;
                                for (let col = 0; col < width; col++) {
                                    const srcPos = srcStart + col * 4;
                                    const dstPos = dstStart + col * 4;
                                    livePart.data[dstPos] = currentFrame.data[srcPos];
                                    livePart.data[dstPos+1] = currentFrame.data[srcPos+1];
                                    livePart.data[dstPos+2] = currentFrame.data[srcPos+2];
                                    livePart.data[dstPos+3] = 255;
                                }
                            }
                            ctx.putImageData(livePart, 0, currentLine);
                            
                            // Рисуем линию сканирования
                            ctx.beginPath();
                            ctx.moveTo(0, currentLine);
                            ctx.lineTo(width, currentLine);
                            ctx.strokeStyle = '#ff3366';
                            ctx.lineWidth = 4;
                            ctx.stroke();
                            
                            ctx.fillStyle = 'rgba(255, 51, 102, 0.2)';
                            ctx.fillRect(0, currentLine - 3, width, 6);
                            
                            animationId = requestAnimationFrame(scanFrame);
                        } else {
                            // Сканирование завершено
                            ctx.putImageData(frozenBuffer, 0, 0);
                            
                            isScanning = false;
                            isScanComplete = true;
                            animationId = null;
                            scanIndicator.style.display = "none";
                            
                            try {
                                lastCapturedImage = canvas.toDataURL('image/png');
                                saveBtn.disabled = false;
                                updateStatus("✅ Сканирование завершено! Можно сохранить изображение");
                                showNotification("Сканирование завершено!");
                            } catch (err) {
                                console.error("Error capturing image:", err);
                                updateStatus("✅ Сканирование завершено");
                            }
                        }
                        
                    } catch (err) {
                        console.error("Scan error:", err);
                        isScanning = false;
                        animationId = null;
                        scanIndicator.style.display = "none";
                        updateStatus("❌ Ошибка сканирования", true);
                        saveBtn.disabled = true;
                    }
                }
                
                if (animationId) cancelAnimationFrame(animationId);
                scanFrame();
            }
            
            function updateStatus(msg, isError = false) {
                statusDiv.innerHTML = msg;
                statusDiv.style.color = isError ? "#ff6b6b" : "#fff";
                console.log(msg);
            }
            
            // Ручное включение камеры (для iOS)
            async function enableCameraManually() {
                if (isCameraReady) {
                    updateStatus("✅ Камера уже включена");
                    return;
                }
                await initCamera();
            }
            
            // Обработчики событий
            captureBtn.addEventListener('click', () => {
                if (!isCameraReady) {
                    updateStatus("⏳ Сначала включите камеру");
                    return;
                }
                startTimeWarpScan();
            });
            
            saveBtn.addEventListener('click', saveImage);
            resetBtn.addEventListener('click', resetScan);
            
            if (enableCameraBtn) {
                enableCameraBtn.addEventListener('click', enableCameraManually);
            }
            
            // Обработка изменения размера
            function handleResize() {
                if (!isScanning && !isScanComplete) {
                    updateCanvasSize();
                } else if (isScanComplete && lastCapturedImage) {
                    const rect = scanContainer.getBoundingClientRect();
                    canvasWidth = rect.width;
                    canvasHeight = rect.height;
                    canvas.width = canvasWidth;
                    canvas.height = canvasHeight;
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0, canvasWidth, canvasHeight);
                    img.src = lastCapturedImage;
                } else if (isScanning) {
                    updateCanvasSize();
                }
            }
            
            window.addEventListener('resize', handleResize);
            window.addEventListener('orientationchange', () => setTimeout(handleResize, 100));
            
            // Очистка
            window.addEventListener('beforeunload', () => {
                if (videoStream) {
                    videoStream.getTracks().forEach(track => track.stop());
                }
                if (renderAnimationId) cancelAnimationFrame(renderAnimationId);
                if (animationId) cancelAnimationFrame(animationId);
            });
            
            // Начальная настройка
            updateCanvasSize();
            
            // Для iOS не запускаем автоматически, для Android/десктопа можно
            if (isIOS) {
                updateStatus("📱 Нажмите 'ВКЛЮЧИТЬ КАМЕРУ' для доступа");
                if (enableCameraBtn) enableCameraBtn.style.display = "flex";
            } else {
                // Для Android и десктопа показываем кнопку, но не запускаем автоматически
                updateStatus("📷 Нажмите 'ВКЛЮЧИТЬ КАМЕРУ' для доступа");
                if (enableCameraBtn) enableCameraBtn.style.display = "flex";
            }
            
            // Периодическая проверка размеров
            setInterval(() => {
                if (!isScanning && !isScanComplete && canvasWidth !== scanContainer.clientWidth) {
                    updateCanvasSize();
                }
            }, 500);
            
            console.log("App initialized - mobile ready");
        })();
    </script>
</body>
</html>
